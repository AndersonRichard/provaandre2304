<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prova — Segurança da Informação e Privacidade de Dados</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1c2537;
    --border: #2a3550;
    --accent: #00e5ff;
    --accent2: #ff4f7b;
    --accent3: #a78bfa;
    --text: #e2e8f0;
    --text-muted: #7a90b0;
    --correct: #10b981;
    --wrong: #ef4444;
    --warn: #f59e0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(167,139,250,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    background: linear-gradient(135deg, #0d1626 0%, #111827 60%, #0f1e30 100%);
    border-bottom: 1px solid var(--border);
    padding: 48px 24px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '🔐';
    position: absolute;
    font-size: 280px;
    opacity: 0.03;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  header .badge {
    display: inline-block;
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.3);
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 2px;
    margin-bottom: 18px;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(22px, 4vw, 40px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
  }
  header h1 span { color: var(--accent); }
  header p {
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 10px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
  }

  /* Progress bar */
  .progress-bar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    height: 6px;
    margin-bottom: 36px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    transition: width 0.5s ease;
    border-radius: 4px;
  }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Question card */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px 28px 24px;
    margin-bottom: 24px;
    transition: border-color 0.3s;
    position: relative;
    overflow: hidden;
  }
  .question-card:hover { border-color: #3a4d70; }
  .question-card::before {
    content: attr(data-num);
    position: absolute;
    top: 12px; right: 20px;
    font-family: 'Syne', sans-serif;
    font-size: 48px;
    font-weight: 800;
    color: rgba(255,255,255,0.03);
    pointer-events: none;
    line-height: 1;
  }
  .question-card.correct { border-color: var(--correct); background: rgba(16,185,129,0.05); }
  .question-card.wrong { border-color: var(--wrong); background: rgba(239,68,68,0.05); }
  .question-card.open-answered { border-color: var(--accent3); background: rgba(167,139,250,0.05); }

  .q-type {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .q-type.multiple { color: var(--accent); }
  .q-type.open { color: var(--accent3); }

  .q-text {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.65;
    margin-bottom: 20px;
    color: var(--text);
  }

  /* Multiple choice */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    width: 100%;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }
  .option:hover:not(:disabled) { border-color: var(--accent); background: rgba(0,229,255,0.05); }
  .option .letter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    background: rgba(0,229,255,0.1);
    border-radius: 3px;
    padding: 2px 7px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .option.selected { border-color: var(--accent); background: rgba(0,229,255,0.08); }
  .option.correct-opt { border-color: var(--correct) !important; background: rgba(16,185,129,0.1) !important; }
  .option.wrong-opt { border-color: var(--wrong) !important; background: rgba(239,68,68,0.1) !important; }
  .option:disabled { cursor: default; opacity: 0.8; }

  /* Open question */
  .open-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    padding: 14px 16px;
    resize: vertical;
    min-height: 110px;
    transition: border-color 0.2s;
    outline: none;
  }
  .open-textarea:focus { border-color: var(--accent3); }
  .open-textarea::placeholder { color: var(--text-muted); }

  .btn-check-open {
    margin-top: 12px;
    background: rgba(167,139,250,0.15);
    border: 1px solid rgba(167,139,250,0.4);
    color: var(--accent3);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 9px 20px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-check-open:hover { background: rgba(167,139,250,0.25); }

  /* Feedback */
  .feedback {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 6px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb {
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    color: #6ee7b7;
  }
  .feedback.wrong-fb {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
  }
  .feedback.open-fb {
    background: rgba(167,139,250,0.1);
    border: 1px solid rgba(167,139,250,0.3);
    color: #c4b5fd;
  }
  .feedback strong {
    display: block;
    margin-bottom: 5px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Score panel */
  #score-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 40px;
    text-align: center;
    margin-top: 40px;
    animation: fadeIn 0.5s ease;
  }
  #score-panel.show { display: block; }
  .score-circle {
    width: 120px; height: 120px;
    border-radius: 50%;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    border: 3px solid var(--accent);
    background: rgba(0,229,255,0.05);
    color: var(--accent);
  }
  #score-panel h2 {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  #score-panel p { color: var(--text-muted); font-size: 14px; }

  .btn-submit {
    display: block;
    width: 100%;
    max-width: 360px;
    margin: 36px auto 0;
    background: linear-gradient(135deg, var(--accent), #0096aa);
    color: #000;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }

  .btn-reset {
    display: inline-block;
    margin-top: 20px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 10px 22px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-reset:hover { border-color: var(--text-muted); color: var(--text); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 20px;
    flex: 1;
    min-width: 130px;
    text-align: center;
  }
  .stat-box .val {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .stat-box .lbl {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 5px;
  }
</style>
</head>
<body>

<header>
  <div class="badge">UNIVÁS — André Luiz Martins de Oliveira</div>
  <h1>Segurança da Informação<br><span>e Privacidade de Dados</span></h1>
  <p>// simulado de estudo — fundamentos</p>
</header>

<div class="container">
  <div class="stats-row">
    <div class="stat-box"><div class="val" id="stat-total">45</div><div class="lbl">Questões</div></div>
    <div class="stat-box"><div class="val" id="stat-mc">30</div><div class="lbl">Múltipla Escolha</div></div>
    <div class="stat-box"><div class="val" id="stat-open">15</div><div class="lbl">Questões Abertas</div></div>
    <div class="stat-box"><div class="val" id="stat-answered">0</div><div class="lbl">Respondidas</div></div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div id="questions-wrap"></div>

  <button class="btn-submit" id="btn-submit" onclick="submitAll()">Finalizar e Ver Resultado</button>

  <div id="score-panel">
    <div class="score-circle" id="score-circle">0%</div>
    <h2 id="score-title"></h2>
    <p id="score-desc"></p>
    <button class="btn-reset" onclick="resetQuiz()">↺ Refazer o simulado</button>
  </div>
</div>

<script>
const questions = [
  // ── MÚLTIPLA ESCOLHA ──────────────────────────────────────────
  {
    type: 'mc',
    text: 'Qual dos itens a seguir NÃO é considerado um elemento da Segurança da Informação?',
    options: [
      'Confidencialidade',
      'Disponibilidade',
      'Escalabilidade',
      'Integridade'
    ],
    correct: 2,
    explanation: 'Escalabilidade é uma característica de sistemas/arquiteturas, não um elemento da segurança da informação. Os elementos clássicos são: Confidencialidade, Autenticidade, Integridade, Disponibilidade, Legalidade e Não-repúdio.'
  },
  {
    type: 'mc',
    text: 'A propriedade que garante que somente pessoas autorizadas tenham acesso à informação é chamada de:',
    options: [
      'Integridade',
      'Disponibilidade',
      'Não-repúdio',
      'Confidencialidade'
    ],
    correct: 3,
    explanation: 'Confidencialidade garante que a informação só é acessível a quem tem autorização, evitando divulgação não autorizada.'
  },
  {
    type: 'mc',
    text: 'Qual lei brasileira ficou conhecida como "Lei Carolina Dieckmann" e trata de crimes cibernéticos?',
    options: [
      'Lei 12.965/2014 (Marco Civil da Internet)',
      'Lei 12.737/2012 (Lei de Crimes Cibernéticos)',
      'Lei 13.709/2018 (LGPD)',
      'Lei 12.587/2011 (Lei de Acesso à Informação)'
    ],
    correct: 1,
    explanation: 'A Lei 12.737/2012 ficou conhecida como Lei Carolina Dieckmann pois foi motivada pelo caso de invasão ao computador da atriz. Ela tipifica crimes como invasão de dispositivo informático.'
  },
  {
    type: 'mc',
    text: 'O Marco Civil da Internet no Brasil é regulamentado por qual legislação?',
    options: [
      'Lei 13.709/2018',
      'Lei 12.737/2012',
      'Lei 12.965/2014',
      'Lei 12.527/2011'
    ],
    correct: 2,
    explanation: 'A Lei 12.965/2014, conhecida como Marco Civil da Internet, estabelece princípios, garantias, direitos e deveres para o uso da internet no Brasil.'
  },
  {
    type: 'mc',
    text: 'Qual dos fatores a seguir está diretamente ligado ao aumento da necessidade de segurança da informação nas organizações?',
    options: [
      'Redução do uso de sistemas baseados em rede',
      'Diminuição dos ataques cibernéticos globais',
      'Impacto direto das falhas de segurança no negócio',
      'Simplificação na administração de sistemas de computação'
    ],
    correct: 2,
    explanation: 'O impacto direto das falhas de segurança no negócio é uma das principais razões pelas quais a segurança da informação se tornou essencial, pois brechas podem gerar perdas financeiras, danos à reputação e responsabilidades legais.'
  },
  {
    type: 'mc',
    text: 'Em segurança da informação, "vulnerabilidade" refere-se a:',
    options: [
      'Um ataque já consumado contra o sistema',
      'A probabilidade de um evento adverso ocorrer',
      'Uma fraqueza ou falha que pode ser explorada por uma ameaça',
      'O agente externo que tenta comprometer o sistema'
    ],
    correct: 2,
    explanation: 'Vulnerabilidade é uma fraqueza ou falha (em hardware, software, processos ou pessoas) que pode ser explorada por uma ameaça para causar dano. Difere de ameaça (agente) e de risco (probabilidade × impacto).'
  },
  {
    type: 'mc',
    text: 'Qual etapa do ciclo de Políticas de Segurança é responsável por tornar o conteúdo acessível a todos os colaboradores?',
    options: [
      'Definição da política',
      'Construção da política',
      'Aprovação da política',
      'Divulgação da política'
    ],
    correct: 3,
    explanation: 'A etapa de Divulgação garante que a política chegue a todos os stakeholders. Sem divulgação adequada, mesmo a melhor política torna-se ineficaz.'
  },
  {
    type: 'mc',
    text: 'Desastres naturais são classificados, no contexto da Segurança da Informação, como:',
    options: [
      'Ameaça interna controlável',
      'Fonte de ataque / ameaça',
      'Vulnerabilidade de software',
      'Política de segurança'
    ],
    correct: 1,
    explanation: 'Desastres naturais (enchentes, incêndios, terremotos) são listados como fontes de ataque/ameaça que podem causar indisponibilidade ou perda de dados, sendo tratados em planos de continuidade de negócios.'
  },
  {
    type: 'mc',
    text: 'A propriedade de segurança que impede que um emissor negue ter enviado uma mensagem é chamada de:',
    options: [
      'Autenticidade',
      'Integridade',
      'Não-repúdio',
      'Confidencialidade'
    ],
    correct: 2,
    explanation: 'Não-repúdio (ou irretratabilidade) garante que uma parte não possa negar a autoria de uma ação ou transação, geralmente implementado com assinaturas digitais e logs de auditoria.'
  },
  {
    type: 'mc',
    text: 'Qual das alternativas representa CORRETAMENTE a sequência lógica de ataque?',
    options: [
      'Exploração → Vulnerabilidade → Ameaça → Ataque',
      'Ameaça → Vulnerabilidade → Ataque → Exploração',
      'Ataque → Risco → Ameaça → Vulnerabilidade',
      'Risco → Alvo → Integridade → Disponibilidade'
    ],
    correct: 1,
    explanation: 'A cadeia típica é: existe uma Ameaça que identifica uma Vulnerabilidade, realiza um Ataque e obtém a Exploração (aproveitamento da falha). Risco é a probabilidade e impacto combinados desse processo.'
  },
  // ── LGPD ─────────────────────────────────────────────────────
  {
    type: 'mc',
    text: 'De acordo com a LGPD, o que caracteriza um dado pessoal?',
    options: [
      'Informação de empresa',
      'Informação de pessoa identificada ou identificável',
      'Dados financeiros apenas',
      'Dados públicos somente'
    ],
    correct: 1,
    explanation: 'Dado pessoal, segundo a LGPD (Lei 13.709/2018), é qualquer informação relacionada a pessoa natural identificada ou identificável, como nome, CPF, endereço, e-mail, entre outros.'
  },
  {
    type: 'mc',
    text: 'Qual é um exemplo de dado pessoal sensível segundo a LGPD?',
    options: [
      'Nome',
      'Endereço',
      'Religião',
      'E-mail'
    ],
    correct: 2,
    explanation: 'Dados sensíveis são uma categoria especial que exige proteção reforçada: origem racial/étnica, convicção religiosa, opinião política, saúde, vida sexual, dado genético ou biométrico. Religião se enquadra nessa categoria.'
  },
  {
    type: 'mc',
    text: 'O termo "tratamento de dados pessoais" na LGPD refere-se a:',
    options: [
      'Apenas armazenamento de dados',
      'Qualquer operação realizada com dados pessoais',
      'Apenas exclusão de dados',
      'Apenas compartilhamento de dados'
    ],
    correct: 1,
    explanation: 'Tratamento abrange toda operação realizada com dados pessoais: coleta, produção, recepção, classificação, utilização, acesso, reprodução, transmissão, distribuição, processamento, arquivamento, armazenamento, eliminação, avaliação ou controle da informação, modificação, comunicação, transferência, difusão ou extração.'
  },
  {
    type: 'mc',
    text: 'Qual princípio da LGPD limita o uso de dados ao mínimo necessário para a finalidade pretendida?',
    options: [
      'Transparência',
      'Necessidade',
      'Concorrência',
      'Marketing'
    ],
    correct: 1,
    explanation: 'O princípio da Necessidade determina que o tratamento deve ser limitado ao mínimo necessário para a realização de suas finalidades, com abrangência dos dados pertinentes, proporcionais e não excessivos em relação às finalidades do tratamento.'
  },
  {
    type: 'mc',
    text: 'O tratamento de dados pessoais pode ocorrer quando:',
    options: [
      'Sempre que a empresa desejar',
      'Nunca sem autorização judicial',
      'Há base legal prevista na LGPD ou contrato',
      'Apenas mediante autorização verbal do titular'
    ],
    correct: 2,
    explanation: 'A LGPD exige uma das 10 bases legais para que o tratamento seja lícito, como: consentimento, cumprimento de obrigação legal, execução de contrato, legítimo interesse, proteção da vida, entre outras.'
  },
  {
    type: 'mc',
    text: 'Segundo a LGPD, o tratamento de dados pessoais de crianças:',
    options: [
      'É de livre uso pelas empresas',
      'Requer consentimento específico dos pais ou responsáveis legais',
      'Pode ser comercializado normalmente',
      'Não possui regras específicas'
    ],
    correct: 1,
    explanation: 'O tratamento de dados de crianças deve ser realizado no seu melhor interesse e exige consentimento específico e em destaque dado por pelo menos um dos pais ou pelo responsável legal.'
  },
  {
    type: 'mc',
    text: 'Quem é o titular dos dados na LGPD?',
    options: [
      'A empresa que coleta os dados',
      'O governo',
      'A pessoa natural a quem os dados se referem',
      'O sistema de TI que armazena os dados'
    ],
    correct: 2,
    explanation: 'Titular é a pessoa natural a quem se referem os dados pessoais que são objeto de tratamento. O titular possui direitos como acesso, correção, portabilidade e exclusão dos seus dados.'
  },
  {
    type: 'mc',
    text: 'Após o término do tratamento, os dados pessoais devem ser:',
    options: [
      'Guardados indefinidamente pela empresa',
      'Eliminados, salvo exceções previstas em lei',
      'Vendidos para terceiros',
      'Publicados em bases abertas'
    ],
    correct: 1,
    explanation: 'Ao término do tratamento, os dados devem ser eliminados, salvo nas hipóteses de cumprimento de obrigação legal, estudo por órgão de pesquisa, transferência a terceiro (com a LGPD assegurada) ou uso exclusivo pelo controlador (desde que anonimizados).'
  },
  {
    type: 'mc',
    text: 'Quem são os responsáveis pelo tratamento de dados na LGPD?',
    options: [
      'Apenas o usuário final',
      'Apenas o governo',

let answered = {};

function buildQuiz() {
  const wrap = document.getElementById('questions-wrap');
  wrap.innerHTML = '';

  // separate sections
  const mc = questions.filter(q => q.type === 'mc');
  const open = questions.filter(q => q.type === 'open');

  function renderSection(list, labelText, offset) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = labelText;
    wrap.appendChild(lbl);

    list.forEach((q, i) => {
      const idx = offset + i;
      const card = document.createElement('div');
      card.className = 'question-card';
      card.setAttribute('data-num', idx + 1);
      card.id = `q${idx}`;

      const typeBadge = `<div class="q-type ${q.type === 'mc' ? 'multiple' : 'open'}">${q.type === 'mc' ? '// múltipla escolha' : '// questão aberta'}</div>`;
      const qText = `<div class="q-text"><strong>Q${idx + 1}.</strong> ${q.text}</div>`;

      let body = '';
      if (q.type === 'mc') {
        const opts = q.options.map((opt, oi) => {
          const letters = ['A','B','C','D'];
          return `<button class="option" onclick="selectOption(${idx}, ${oi})" id="opt_${idx}_${oi}">
            <span class="letter">${letters[oi]}</span>
            <span>${opt}</span>
          </button>`;
        }).join('');
        body = `<div class="options" id="opts_${idx}">${opts}</div>
                <div class="feedback" id="fb_${idx}"></div>`;
      } else {
        body = `<textarea class="open-textarea" id="oa_${idx}" placeholder="Digite sua resposta aqui..."></textarea>
                <button class="btn-check-open" onclick="checkOpen(${idx})">Ver gabarito</button>
                <div class="feedback open-fb" id="fb_${idx}"></div>`;
      }

      card.innerHTML = typeBadge + qText + body;
      wrap.appendChild(card);
    });
  }

  renderSection(mc, '01 — Múltipla Escolha (Fundamentos + LGPD + Privacidade + Pol. Segurança)', 0);
  renderSection(open, '02 — Questões Abertas', mc.length);
}

function selectOption(qIdx, optIdx) {
  if (answered[qIdx] !== undefined) return;
  const q = questions[qIdx];
  const card = document.getElementById(`q${qIdx}`);
  const fb = document.getElementById(`fb_${qIdx}`);
  const opts = card.querySelectorAll('.option');

  opts.forEach(o => o.disabled = true);
  opts[optIdx].classList.add('selected');
  opts[q.correct].classList.add('correct-opt');

  answered[qIdx] = (optIdx === q.correct);

  if (optIdx === q.correct) {
    card.classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = `<strong>✓ Correto!</strong>${q.explanation}`;
    if (optIdx !== q.correct) opts[optIdx].classList.add('wrong-opt');
  } else {
    opts[optIdx].classList.add('wrong-opt');
    card.classList.add('wrong');
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = `<strong>✗ Incorreto.</strong>${q.explanation}`;
  }

  updateProgress();
}

function checkOpen(qIdx) {
  const q = questions[qIdx];
  const card = document.getElementById(`q${qIdx}`);
  const ta = document.getElementById(`oa_${qIdx}`);
  const fb = document.getElementById(`fb_${qIdx}`);
  const btn = card.querySelector('.btn-check-open');

  answered[qIdx] = true;
  btn.disabled = true;
  btn.style.opacity = '0.5';
  card.classList.add('open-answered');

  fb.className = 'feedback open-fb show';
  fb.innerHTML = `<strong>📋 Gabarito esperado:</strong><pre style="white-space:pre-wrap;font-size:13px;font-family:'IBM Plex Mono',monospace;line-height:1.7;margin-top:4px">${q.gabarito}</pre>`;

  updateProgress();
}

function updateProgress() {
  const total = questions.length;
  const done = Object.keys(answered).length;
  document.getElementById('stat-answered').textContent = done;
  document.getElementById('progress-fill').style.width = (done / total * 100) + '%';
}

function submitAll() {
  const mcTotal = questions.filter(q => q.type === 'mc').length;
  const mcCorrect = questions
    .map((q, i) => q.type === 'mc' ? answered[i] : null)
    .filter(v => v === true).length;

  const pct = Math.round((mcCorrect / mcTotal) * 100);

  const panel = document.getElementById('score-panel');
  const circle = document.getElementById('score-circle');
  const title = document.getElementById('score-title');
  const desc = document.getElementById('score-desc');

  circle.textContent = pct + '%';
  if (pct >= 70) {
    circle.style.color = 'var(--correct)';
    circle.style.borderColor = 'var(--correct)';
    title.textContent = '🎉 Bom desempenho!';
    desc.textContent = `Você acertou ${mcCorrect} de ${mcTotal} questões de múltipla escolha (${pct}%). Revise as abertas com atenção!`;
  } else if (pct >= 50) {
    circle.style.color = 'var(--warn)';
    circle.style.borderColor = 'var(--warn)';
    title.textContent = '⚠️ Precisa melhorar';
    desc.textContent = `Você acertou ${mcCorrect} de ${mcTotal} questões objetivas (${pct}%). Revise os fundamentos e tente novamente.`;
  } else {
    circle.style.color = 'var(--wrong)';
    circle.style.borderColor = 'var(--wrong)';
    title.textContent = '📚 Continue estudando!';
    desc.textContent = `Você acertou apenas ${mcCorrect} de ${mcTotal} questões objetivas (${pct}%). Releia o material e refaça o simulado.`;
  }

  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetQuiz() {
  answered = {};
  document.getElementById('stat-answered').textContent = '0';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('score-panel').classList.remove('show');
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
