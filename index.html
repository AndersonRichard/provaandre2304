<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prova — Segurança da Informação e Privacidade de Dados</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1c2537;
    --border: #2a3550;
    --accent: #00e5ff;
    --accent2: #ff4f7b;
    --accent3: #a78bfa;
    --text: #e2e8f0;
    --text-muted: #7a90b0;
    --correct: #10b981;
    --wrong: #ef4444;
    --warn: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(167,139,250,0.05) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  header {
    background: linear-gradient(135deg, #0d1626 0%, #111827 60%, #0f1e30 100%);
    border-bottom: 1px solid var(--border);
    padding: 48px 24px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '🔐';
    position: absolute;
    font-size: 280px;
    opacity: 0.03;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  header .badge {
    display: inline-block;
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.3);
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 2px;
    margin-bottom: 18px;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(22px, 4vw, 40px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
  }
  header h1 span { color: var(--accent); }
  header p {
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 10px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
  }
  /* Stats */
  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 20px;
    flex: 1;
    min-width: 110px;
    text-align: center;
  }
  .stat-box .val {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .stat-box .lbl {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 5px;
  }
  /* Shuffle bar */
  .shuffle-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .shuffle-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .shuffle-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .shuffle-btn:hover { border-color: var(--accent); color: var(--accent); }
  .shuffle-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.07); }
  .shuffle-btn svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  /* Progress */
  .progress-bar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    height: 6px;
    margin-bottom: 36px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    transition: width 0.5s ease;
    border-radius: 4px;
  }
  /* Section label */
  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  /* Card */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px 28px 24px;
    margin-bottom: 24px;
    transition: border-color 0.3s;
    position: relative;
    overflow: hidden;
  }
  .question-card:hover { border-color: #3a4d70; }
  .question-card::before {
    content: attr(data-num);
    position: absolute;
    top: 12px; right: 20px;
    font-family: 'Syne', sans-serif;
    font-size: 48px;
    font-weight: 800;
    color: rgba(255,255,255,0.03);
    pointer-events: none;
    line-height: 1;
  }
  .question-card.correct { border-color: var(--correct); background: rgba(16,185,129,0.05); }
  .question-card.wrong   { border-color: var(--wrong);   background: rgba(239,68,68,0.05);  }
  .q-type {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .q-text {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.65;
    margin-bottom: 20px;
    color: var(--text);
  }
  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    width: 100%;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }
  .option:hover:not(:disabled) { border-color: var(--accent); background: rgba(0,229,255,0.05); }
  .option .letter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    background: rgba(0,229,255,0.1);
    border-radius: 3px;
    padding: 2px 7px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .option.selected    { border-color: var(--accent);   background: rgba(0,229,255,0.08);              }
  .option.correct-opt { border-color: var(--correct) !important; background: rgba(16,185,129,0.1) !important; }
  .option.wrong-opt   { border-color: var(--wrong)   !important; background: rgba(239,68,68,0.1)  !important; }
  .option:disabled    { cursor: default; opacity: 0.8; }
  /* Feedback */
  .feedback {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 6px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
  .feedback.wrong-fb   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: #fca5a5; }
  .feedback strong {
    display: block;
    margin-bottom: 5px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  /* Score */
  #score-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 40px;
    text-align: center;
    margin-top: 40px;
    animation: fadeIn 0.5s ease;
  }
  #score-panel.show { display: block; }
  .score-circle {
    width: 120px; height: 120px;
    border-radius: 50%;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    border: 3px solid var(--accent);
    background: rgba(0,229,255,0.05);
    color: var(--accent);
  }
  #score-panel h2 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  #score-panel p  { color: var(--text-muted); font-size: 14px; }
  .btn-submit {
    display: block;
    width: 100%;
    max-width: 360px;
    margin: 36px auto 0;
    background: linear-gradient(135deg, var(--accent), #0096aa);
    color: #000;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-submit:hover  { opacity: 0.9; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }
  .btn-reset {
    display: inline-block;
    margin-top: 20px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 10px 22px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-reset:hover { border-color: var(--text-muted); color: var(--text); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header>
  <div class="badge">UNIVÁS — André Luiz Martins de Oliveira</div>
  <h1>Segurança da Informação<br><span>e Privacidade de Dados</span></h1>
  <p>// simulado de estudo — fundamentos</p>
</header>

<div class="container">
  <div class="stats-row">
    <div class="stat-box"><div class="val" id="stat-total">45</div><div class="lbl">Questões</div></div>
    <div class="stat-box"><div class="val" id="stat-answered">0</div><div class="lbl">Respondidas</div></div>
    <div class="stat-box"><div class="val" id="stat-correct">0</div><div class="lbl">Corretas</div></div>
    <div class="stat-box"><div class="val" id="stat-wrong">0</div><div class="lbl">Erradas</div></div>
  </div>

  <div class="shuffle-bar">
    <span class="shuffle-label">// embaralhar:</span>
    <button class="shuffle-btn" id="btn-shuffle-q" onclick="toggleShuffle('q')" title="Embaralhar ordem das questões">
      <svg viewBox="0 0 24 24"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
      Questões
    </button>
    <button class="shuffle-btn" id="btn-shuffle-a" onclick="toggleShuffle('a')" title="Embaralhar ordem das alternativas">
      <svg viewBox="0 0 24 24"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
      Alternativas
    </button>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div id="questions-wrap"></div>

  <button class="btn-submit" onclick="submitAll()">Finalizar e Ver Resultado</button>

  <div id="score-panel">
    <div class="score-circle" id="score-circle">0%</div>
    <h2 id="score-title"></h2>
    <p id="score-desc"></p>
    <button class="btn-reset" onclick="resetQuiz()">↺ Refazer o simulado</button>
  </div>
</div>

<script>
const allQuestions = [

  // ── FUNDAMENTOS DE SEGURANÇA DA INFORMAÇÃO ───────────────────
  {
    section: 'Fundamentos de Segurança da Informação',
    text: 'Qual dos itens a seguir NÃO é considerado um elemento da Segurança da Informação?',
    options: ['Confidencialidade','Disponibilidade','Escalabilidade','Integridade'],
    correct: 2,
    explanation: 'Escalabilidade é uma característica de sistemas/arquiteturas, não um elemento da segurança da informação. Os elementos clássicos são: Confidencialidade, Autenticidade, Integridade, Disponibilidade, Legalidade e Não-repúdio.'
  },
  {
    section: 'Fundamentos de Segurança da Informação',
    text: 'A propriedade que garante que somente pessoas autorizadas tenham acesso à informação é chamada de:',
    options: ['Integridade','Disponibilidade','Não-repúdio','Confidencialidade'],
    correct: 3,
    explanation: 'Confidencialidade garante que a informação só é acessível a quem tem autorização, evitando divulgação não autorizada.'
  },
  {
    section: 'Fundamentos de Segurança da Informação',
    text: 'Qual lei brasileira ficou conhecida como "Lei Carolina Dieckmann" e trata de crimes cibernéticos?',
    options: ['Lei 12.965/2014 (Marco Civil da Internet)','Lei 12.737/2012 (Lei de Crimes Cibernéticos)','Lei 13.709/2018 (LGPD)','Lei 12.527/2011 (Lei de Acesso à Informação)'],
    correct: 1,
    explanation: 'A Lei 12.737/2012 ficou conhecida como Lei Carolina Dieckmann pois foi motivada pelo caso de invasão ao computador da atriz. Ela tipifica crimes como invasão de dispositivo informático.'
  },
  {
    section: 'Fundamentos de Segurança da Informação',
    text: 'O Marco Civil da Internet no Brasil é regulamentado por qual legislação?',
    options: ['Lei 13.709/2018','Lei 12.737/2012','Lei 12.965/2014','Lei 12.527/2011'],
    correct: 2,
    explanation: 'A Lei 12.965/2014, conhecida como Marco Civil da Internet, estabelece princípios, garantias, direitos e deveres para o uso da internet no Brasil.'
  },
  {
    section: 'Fundamentos de Segurança da Informação',
    text: 'Qual dos fatores está diretamente ligado ao aumento da necessidade de segurança da informação nas organizações?',
    options: ['Redução do uso de sistemas baseados em rede','Diminuição dos ataques cibernéticos globais','Impacto direto das falhas de segurança no negócio','Simplificação na administração de sistemas'],
    correct: 2,
    explanation: 'O impacto direto das falhas de segurança no negócio é uma das principais razões pelas quais a segurança da informação se tornou essencial: brechas podem gerar perdas financeiras, danos à reputação e responsabilidades legais.'
  },
  {
    section: 'Fundamentos de Segurança da Informação',
    text: 'Em segurança da informação, "vulnerabilidade" refere-se a:',
    options: ['Um ataque já consumado contra o sistema','A probabilidade de um evento adverso ocorrer','Uma fraqueza ou falha que pode ser explorada por uma ameaça','O agente externo que tenta comprometer o sistema'],
    correct: 2,
    explanation: 'Vulnerabilidade é uma fraqueza ou falha (em hardware, software, processos ou pessoas) que pode ser explorada por uma ameaça para causar dano. Difere de ameaça (agente) e de risco (probabilidade × impacto).'
  },
  {
    section: 'Fundamentos de Segurança da Informação',
    text: 'Qual etapa do ciclo de Políticas de Segurança torna o conteúdo acessível a todos os colaboradores?',
    options: ['Definição da política','Construção da política','Aprovação da política','Divulgação da política'],
    correct: 3,
    explanation: 'A etapa de Divulgação garante que a política chegue a todos os stakeholders. Sem divulgação adequada, mesmo a melhor política torna-se ineficaz.'
  },
  {
    section: 'Fundamentos de Segurança da Informação',
    text: 'Desastres naturais são classificados, no contexto da Segurança da Informação, como:',
    options: ['Ameaça interna controlável','Fonte de ataque / ameaça','Vulnerabilidade de software','Política de segurança'],
    correct: 1,
    explanation: 'Desastres naturais (enchentes, incêndios, terremotos) são listados como fontes de ataque/ameaça que podem causar indisponibilidade ou perda de dados, sendo tratados em planos de continuidade de negócios.'
  },
  {
    section: 'Fundamentos de Segurança da Informação',
    text: 'A propriedade de segurança que impede que um emissor negue ter enviado uma mensagem é chamada de:',
    options: ['Autenticidade','Integridade','Não-repúdio','Confidencialidade'],
    correct: 2,
    explanation: 'Não-repúdio (ou irretratabilidade) garante que uma parte não possa negar a autoria de uma ação ou transação, geralmente implementado com assinaturas digitais e logs de auditoria.'
  },
  {
    section: 'Fundamentos de Segurança da Informação',
    text: 'Qual representa CORRETAMENTE a sequência lógica de um ataque?',
    options: ['Exploração → Vulnerabilidade → Ameaça → Ataque','Ameaça → Vulnerabilidade → Ataque → Exploração','Ataque → Risco → Ameaça → Vulnerabilidade','Risco → Alvo → Integridade → Disponibilidade'],
    correct: 1,
    explanation: 'A cadeia típica é: existe uma Ameaça que identifica uma Vulnerabilidade, realiza um Ataque e obtém a Exploração. Risco é a probabilidade e impacto combinados desse processo.'
  },
  {
    section: 'Fundamentos de Segurança da Informação',
    text: 'Qual é a diferença entre "ameaça" e "vulnerabilidade" na segurança da informação?',
    options: ['São sinônimos e podem ser usados de forma intercambiável','Ameaça é o agente/evento que pode causar dano; vulnerabilidade é a falha que pode ser explorada','Vulnerabilidade é o ataque em si; ameaça é o resultado do ataque','Ameaça é sempre interna; vulnerabilidade é sempre externa'],
    correct: 1,
    explanation: 'Ameaça é qualquer agente ou evento (hacker, vírus, desastre) com potencial de causar dano. Vulnerabilidade é a fraqueza ou falha (senha fraca, sistema desatualizado) que a ameaça pode explorar para concretizar o dano.'
  },
  {
    section: 'Fundamentos de Segurança da Informação',
    text: 'Cite a sequência correta das etapas do ciclo de uma política de segurança da informação:',
    options: ['Divulgação → Definição → Construção → Aprovação','Definição → Construção → Aprovação → Divulgação','Aprovação → Definição → Divulgação → Construção','Construção → Aprovação → Definição → Divulgação'],
    correct: 1,
    explanation: 'O ciclo correto é: 1) Definição — escopo e objetivos; 2) Construção — redação das regras; 3) Aprovação — validação pela alta gestão; 4) Divulgação — comunicação a todos os envolvidos.'
  },
  {
    section: 'Fundamentos de Segurança da Informação',
    text: 'Por que o aumento de ambientes de rede ampliou a importância da segurança da informação?',
    options: ['Reduziu o número de dispositivos a proteger','Ampliou a superfície de ataque, criando mais pontos de entrada para invasores','Simplificou o gerenciamento de senhas','Eliminou a necessidade de antivírus'],
    correct: 1,
    explanation: 'Mais dispositivos conectados significam mais pontos de entrada para invasores. Aplicações web podem sofrer SQL Injection; redes Wi-Fi abertas permitem sniffing; nuvens mal configuradas expõem dados — a interdependência propaga falhas rapidamente.'
  },

  // ── LGPD ─────────────────────────────────────────────────────
  {
    section: 'LGPD',
    text: 'De acordo com a LGPD, o que caracteriza um dado pessoal?',
    options: ['Informação de empresa','Informação de pessoa identificada ou identificável','Dados financeiros apenas','Dados públicos somente'],
    correct: 1,
    explanation: 'Dado pessoal, segundo a LGPD (Lei 13.709/2018), é qualquer informação relacionada a pessoa natural identificada ou identificável, como nome, CPF, endereço, e-mail, entre outros.'
  },
  {
    section: 'LGPD',
    text: 'Qual é um exemplo de dado pessoal sensível segundo a LGPD?',
    options: ['Nome','Endereço','Religião','E-mail'],
    correct: 2,
    explanation: 'Dados sensíveis são categoria especial que exige proteção reforçada: origem racial/étnica, convicção religiosa, opinião política, saúde, vida sexual, dado genético ou biométrico. Religião se enquadra nessa categoria.'
  },
  {
    section: 'LGPD',
    text: 'O termo "tratamento de dados pessoais" na LGPD refere-se a:',
    options: ['Apenas armazenamento de dados','Qualquer operação realizada com dados pessoais','Apenas exclusão de dados','Apenas compartilhamento de dados'],
    correct: 1,
    explanation: 'Tratamento abrange toda operação realizada com dados pessoais: coleta, produção, recepção, classificação, utilização, acesso, reprodução, transmissão, distribuição, processamento, arquivamento, armazenamento, eliminação, avaliação, modificação, comunicação, transferência, difusão ou extração.'
  },
  {
    section: 'LGPD',
    text: 'Qual princípio da LGPD limita o uso de dados ao mínimo necessário para a finalidade pretendida?',
    options: ['Transparência','Necessidade','Concorrência','Marketing'],
    correct: 1,
    explanation: 'O princípio da Necessidade determina que o tratamento deve ser limitado ao mínimo necessário para a realização de suas finalidades, com dados pertinentes, proporcionais e não excessivos.'
  },
  {
    section: 'LGPD',
    text: 'O tratamento de dados pessoais pode ocorrer quando:',
    options: ['Sempre que a empresa desejar','Nunca sem autorização judicial','Há base legal prevista na LGPD ou contrato','Apenas mediante autorização verbal do titular'],
    correct: 2,
    explanation: 'A LGPD exige uma das 10 bases legais para que o tratamento seja lícito: consentimento, cumprimento de obrigação legal, execução de contrato, legítimo interesse, proteção da vida, entre outras.'
  },
  {
    section: 'LGPD',
    text: 'Segundo a LGPD, o tratamento de dados pessoais de crianças:',

// ─── Estado ──────────────────────────────────────────────────
let shuffleQuestions = false;
let shuffleAnswers   = false;
let activeQuestions  = [];
let answered         = {};

function toggleShuffle(type) {
  if (type === 'q') {
    shuffleQuestions = !shuffleQuestions;
    document.getElementById('btn-shuffle-q').classList.toggle('active', shuffleQuestions);
  } else {
    shuffleAnswers = !shuffleAnswers;
    document.getElementById('btn-shuffle-a').classList.toggle('active', shuffleAnswers);
  }
  resetQuiz();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildActiveQuestions() {
  const qs = shuffleQuestions ? shuffle(allQuestions) : [...allQuestions];
  activeQuestions = qs.map(q => {
    if (shuffleAnswers) {
      const indexed = q.options.map((opt, i) => ({ opt, isCorrect: i === q.correct }));
      const shuffled = shuffle(indexed);
      return { q, shuffledOpts: shuffled.map(x => x.opt), correctShuffledIdx: shuffled.findIndex(x => x.isCorrect) };
    }
    return { q, shuffledOpts: q.options, correctShuffledIdx: q.correct };
  });
}

function buildQuiz() {
  buildActiveQuestions();
  answered = {};

  const total = activeQuestions.length;
  document.getElementById('stat-total').textContent    = total;
  document.getElementById('stat-answered').textContent = '0';
  document.getElementById('stat-correct').textContent  = '0';
  document.getElementById('stat-wrong').textContent    = '0';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('score-panel').classList.remove('show');

  const wrap = document.getElementById('questions-wrap');
  wrap.innerHTML = '';

  // Group by section preserving order of first appearance
  const sections = [];
  const sectionMap = {};
  activeQuestions.forEach((item, idx) => {
    const sec = item.q.section;
    if (!sectionMap[sec]) { sectionMap[sec] = []; sections.push(sec); }
    sectionMap[sec].push(idx);
  });

  let sNum = 1;
  sections.forEach(sec => {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = `${String(sNum).padStart(2,'0')} — ${sec}`;
    wrap.appendChild(lbl);
    sNum++;

    sectionMap[sec].forEach(idx => {
      const { q, shuffledOpts } = activeQuestions[idx];
      const letters = ['A','B','C','D'];

      const card = document.createElement('div');
      card.className = 'question-card';
      card.setAttribute('data-num', idx + 1);
      card.id = `q${idx}`;

      const opts = shuffledOpts.map((opt, oi) =>
        `<button class="option" onclick="selectOption(${idx},${oi})" id="opt_${idx}_${oi}">
          <span class="letter">${letters[oi]}</span>
          <span>${opt}</span>
        </button>`
      ).join('');

      card.innerHTML = `<div class="q-type multiple">// múltipla escolha</div>
        <div class="q-text"><strong>Q${idx + 1}.</strong> ${q.text}</div>
        <div class="options" id="opts_${idx}">${opts}</div>
        <div class="feedback" id="fb_${idx}"></div>`;

      wrap.appendChild(card);
    });
  });
}

function selectOption(qIdx, optIdx) {
  if (answered[qIdx] !== undefined) return;
  const { q, correctShuffledIdx } = activeQuestions[qIdx];
  const card = document.getElementById(`q${qIdx}`);
  const fb   = document.getElementById(`fb_${qIdx}`);
  const opts = card.querySelectorAll('.option');

  opts.forEach(o => o.disabled = true);
  opts[optIdx].classList.add('selected');
  opts[correctShuffledIdx].classList.add('correct-opt');

  const isCorrect = optIdx === correctShuffledIdx;
  answered[qIdx] = isCorrect;

  if (isCorrect) {
    card.classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = `<strong>✓ Correto!</strong>${q.explanation}`;
  } else {
    opts[optIdx].classList.add('wrong-opt');
    card.classList.add('wrong');
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = `<strong>✗ Incorreto.</strong>${q.explanation}`;
  }

  updateProgress();
}

function updateProgress() {
  const done    = Object.keys(answered).length;
  const correct = Object.values(answered).filter(v => v === true).length;
  const wrong   = done - correct;
  document.getElementById('stat-answered').textContent = done;
  document.getElementById('stat-correct').textContent  = correct;
  document.getElementById('stat-wrong').textContent    = wrong;
  document.getElementById('progress-fill').style.width = (done / activeQuestions.length * 100) + '%';
}

function submitAll() {
  const total   = activeQuestions.length;
  const correct = Object.values(answered).filter(v => v === true).length;
  const pct     = Math.round((correct / total) * 100);

  const circle = document.getElementById('score-circle');
  const title  = document.getElementById('score-title');
  const desc   = document.getElementById('score-desc');
  const panel  = document.getElementById('score-panel');

  circle.textContent = pct + '%';
  if (pct >= 70) {
    circle.style.color = circle.style.borderColor = 'var(--correct)';
    title.textContent = '🎉 Bom desempenho!';
    desc.textContent  = `Você acertou ${correct} de ${total} questões (${pct}%). Continue assim!`;
  } else if (pct >= 50) {
    circle.style.color = circle.style.borderColor = 'var(--warn)';
    title.textContent = '⚠️ Precisa melhorar';
    desc.textContent  = `Você acertou ${correct} de ${total} questões (${pct}%). Revise os fundamentos e tente novamente.`;
  } else {
    circle.style.color = circle.style.borderColor = 'var(--wrong)';
    title.textContent = '📚 Continue estudando!';
    desc.textContent  = `Você acertou apenas ${correct} de ${total} questões (${pct}%). Releia o material e refaça o simulado.`;
  }

  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetQuiz() {
  document.getElementById('score-panel').classList.remove('show');
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
